name: ✨ Feature Request
description: Suggest a new feature or improvement
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What area does this feature relate to?
      options:
        - Lua API (new binding/function)
        - Modloader Core (C++ engine)
        - Debug Menu / UI
        - Deploy Tools
        - Documentation / Examples
        - New Mod Idea
        - Game Support (new title)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear description of the feature you'd like.
      placeholder: 'What would you like to see? How would it work?'
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why is this feature needed? What problem does it solve?
      placeholder: 'I want to create a mod that does X, but currently...'
    validations:
      required: true

  - type: textarea
    id: api-design
    attributes:
      label: Proposed API (if applicable)
      description: If this is a Lua API addition, what should it look like?
      render: lua

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've considered.

  - type: dropdown
    id: willing
    attributes:
      label: Would you be willing to implement this?
      options:
        - "Yes, I'd like to submit a PR"
        - 'I could help with testing'
        - 'No, just suggesting'
